<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🐣</text></svg>'>
<title>신입 키우기 — 수습 12주</title>
<style>
:root{
  --bg:#E9EBEE; --panel:#FFFFFF; --paper:#F7F8FA; --ink:#20242C; --sub:#697180;
  --line:#D6DAE1; --blue:#2E5FB8; --blue-soft:#EAF0FB; --red:#C13B32; --red-soft:#FBEEED;
  --hint-bg:#FFF3BF; --hint-ink:#6b5500; --ok:#2E7D4F;
  --shadow:0 1px 2px rgba(24,32,48,.06),0 6px 20px rgba(24,32,48,.07);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#131519; --panel:#1C1F25; --paper:#22262D; --ink:#E6E8EC; --sub:#9AA1AC;
    --line:#2C313A; --blue:#7FA5EC; --blue-soft:#232C3D; --red:#E0655C; --red-soft:#3A2523;
    --hint-bg:#3A331A; --hint-ink:#E8D27A; --ok:#6FBF8F;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#131519; --panel:#1C1F25; --paper:#22262D; --ink:#E6E8EC; --sub:#9AA1AC;
  --line:#2C313A; --blue:#7FA5EC; --blue-soft:#232C3D; --red:#E0655C; --red-soft:#3A2523;
  --hint-bg:#3A331A; --hint-ink:#E8D27A; --ok:#6FBF8F;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#E9EBEE; --panel:#FFFFFF; --paper:#F7F8FA; --ink:#20242C; --sub:#697180;
  --line:#D6DAE1; --blue:#2E5FB8; --blue-soft:#EAF0FB; --red:#C13B32; --red-soft:#FBEEED;
  --hint-bg:#FFF3BF; --hint-ink:#6b5500; --ok:#2E7D4F;
  --shadow:0 1px 2px rgba(24,32,48,.06),0 6px 20px rgba(24,32,48,.07);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Apple SD Gothic Neo",Pretendard,"Noto Sans KR","Malgun Gothic",sans-serif;
  line-height:1.65; font-size:16px;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}
#wrap{max-width:640px;margin:0 auto;padding:20px 16px 64px}
.gw-bar{
  background:var(--blue); color:#fff; border-radius:8px 8px 0 0;
  padding:8px 14px; font-size:12px; letter-spacing:.08em;
  display:flex; justify-content:space-between; align-items:center;
}
.gw-bar .sys{opacity:.85}
.sheet{
  background:var(--panel); border:1px solid var(--line); border-top:none;
  border-radius:0 0 10px 10px; box-shadow:var(--shadow);
  padding:26px 24px;
}
h1,h2,h3{margin:0;text-wrap:balance}
.eyebrow{
  font-size:11px; letter-spacing:.22em; color:var(--sub); text-transform:uppercase;
  margin-bottom:10px;
}
/* ---------- title ---------- */
#title h1{font-size:44px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
#title .tagline{color:var(--sub);margin:14px 0 0;max-width:34em}
.next-assign{
  margin-top:22px;padding:14px 16px;background:var(--paper);
  border:1px dashed var(--line);border-radius:8px;font-size:14px;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.next-assign b{color:var(--blue)}
.stampboard{margin-top:26px}
.stampboard .lbl{font-size:12px;letter-spacing:.14em;color:var(--sub);margin-bottom:10px}
.stampgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.slot{
  aspect-ratio:1; border:1.5px dashed var(--line); border-radius:50%;
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:11px;color:var(--sub);padding:6px;
}
.slot.got{
  border:2.5px solid var(--red); border-style:solid; color:var(--red);
  font-weight:800; transform:rotate(-7deg); font-size:12px; line-height:1.25;
  background:var(--red-soft);
}
.slot.hidden-slot{letter-spacing:.2em}
/* ---------- buttons ---------- */
.btn{
  display:block;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:13px 16px;margin-top:10px;font:inherit;color:var(--ink);
  cursor:pointer;transition:border-color .12s, background .12s;
}
.btn:hover{border-color:var(--blue);background:var(--blue-soft)}
.btn:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.btn .num{
  display:inline-block;min-width:1.4em;color:var(--blue);font-weight:700;margin-right:4px;
}
.btn.primary{
  background:var(--blue);color:#fff;text-align:center;font-weight:700;border-color:var(--blue);
}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghostbtn{text-align:center;color:var(--sub)}
.btn.askbtn{border-style:dashed;color:var(--sub);font-size:14.5px;margin-top:16px}
.btn.askbtn:hover{color:var(--ink)}
.ask-sub{font-size:13px;color:var(--sub);display:block;margin-top:2px}
/* ---------- game hud ---------- */
.hud{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;gap:8px;flex-wrap:wrap;
}
.weekstamp{font-size:13px;color:var(--sub);letter-spacing:.06em}
.weekstamp b{color:var(--ink)}
.dots{display:flex;gap:4px}
.dots i{width:8px;height:8px;border-radius:2px;background:var(--line)}
.dots i.on{background:var(--blue)}
.daychip{
  display:inline-block;font-size:11px;letter-spacing:.18em;
  background:var(--blue-soft);color:var(--blue);border-radius:4px;
  padding:3px 10px;margin-bottom:14px;font-weight:700;
}
.daychip.fri{background:var(--red-soft);color:var(--red)}
.evt-text{font-size:17px;white-space:pre-line}
.evt-text .nb{font-weight:700}
/* ---------- reaction bubble ---------- */
.bubble{
  margin-top:18px;background:var(--paper);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px;position:relative;white-space:pre-line;
}
.bubble .who{font-size:12px;color:var(--sub);letter-spacing:.1em;margin-bottom:4px;font-weight:700}
/* ---------- friday report ---------- */
.report{
  border:1.5px dashed var(--line);background:var(--paper);
  border-radius:10px;padding:18px 20px;margin-top:6px;
}
.report h3{font-size:14px;letter-spacing:.14em;color:var(--sub);font-weight:700;margin-bottom:12px}
.report ul{margin:0;padding-left:1.2em}
.report li{margin:8px 0}
.report li.hinted{
  background:var(--hint-bg);color:var(--hint-ink);border-radius:4px;padding:2px 6px;
  list-style-position:inside;
}
.tutor-note{font-size:12.5px;color:var(--hint-ink);background:var(--hint-bg);
  border-radius:6px;padding:8px 12px;margin-top:12px}
/* ---------- ending ---------- */
.end-sheet{position:relative}
.end-head{font-size:12px;letter-spacing:.2em;color:var(--sub);border-bottom:2px solid var(--ink);
  padding-bottom:8px;margin-bottom:18px;font-weight:700}
.end-title{font-size:30px;font-weight:800;letter-spacing:-.01em;margin:6px 0 14px}
.end-body{white-space:pre-line}
.stamp{
  position:absolute;top:34px;right:18px;width:104px;height:104px;border-radius:50%;
  border:3.5px solid var(--red);color:var(--red);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;text-align:center;line-height:1.25;transform:rotate(-10deg);
  background:color-mix(in srgb,var(--red-soft) 70%, transparent);
  animation:thunk .28s cubic-bezier(.2,1.6,.4,1) both; pointer-events:none;
}
@keyframes thunk{from{transform:rotate(-10deg) scale(1.9);opacity:0}to{transform:rotate(-10deg) scale(1);opacity:1}}
@media (prefers-reduced-motion:reduce){.stamp{animation:none}.fadein{animation:none}}
.retro{margin-top:26px;border-top:1px solid var(--line);padding-top:18px}
.retro h3{font-size:14px;letter-spacing:.14em;color:var(--sub);margin-bottom:12px}
.retro .row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:14.5px}
.retro .row .k{width:74px;color:var(--sub);flex-shrink:0;font-size:13px}
.bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--blue);border-radius:4px}
.bar i.warn{background:var(--red)}
.verdict{margin:10px 0;padding:10px 14px;background:var(--paper);border-radius:8px;font-size:14px}
.verdict .vq{color:var(--sub)}
.verdict .vt{font-weight:700;margin-top:2px}
.verdict .vt.real{color:var(--red)}
.verdict .vt.noise{color:var(--ok)}
.quotelist{background:var(--red-soft);border-radius:8px;padding:12px 16px;margin:12px 0;font-size:14px}
.quotelist .q{margin:6px 0}
.typecard{
  background:var(--blue-soft);border-radius:8px;padding:12px 16px;margin:4px 0 14px;font-size:14.5px;
}
.typecard b{color:var(--blue)}
.fadein{animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.meta-tease{margin-top:20px;border:1.5px solid var(--blue);border-radius:10px;padding:16px 18px;background:var(--blue-soft)}
.meta-tease h3{font-size:15px;margin-bottom:8px}
.meta-tease ul{margin:0;padding-left:1.2em;font-size:14px}
.subtle{color:var(--sub);font-size:13px}
hr.thin{border:none;border-top:1px solid var(--line);margin:20px 0}
.storybox{margin-top:24px;border:1.5px dashed var(--blue);border-radius:10px;padding:16px 18px;background:var(--blue-soft)}
.storybox h3{font-size:15px;margin-bottom:6px}
.storybox textarea{
  width:100%;margin-top:10px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:var(--panel);color:var(--ink);font:inherit;font-size:14.5px;resize:vertical;
}
.storybox textarea:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.storylist{margin-top:10px}
.storylist .st{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:14px}
.storylist .st .meta{font-size:12px;color:var(--sub);margin-bottom:2px}
.nbstat{display:flex;align-items:center;gap:10px;margin:0 0 14px;font-size:13px;color:var(--sub)}
.nbstat .bar{max-width:180px}
.storytag{display:inline-block;font-size:11px;letter-spacing:.08em;background:var(--red-soft);color:var(--red);border-radius:4px;padding:2px 8px;margin:0 0 10px 8px;font-weight:700}
</style>
</head>
<body>
<div id="wrap">
  <div class="gw-bar mono"><span>HR-OS v4.2</span><span class="sys" id="gwRight">제5인사팀 온보딩 관리</span></div>
  <div class="sheet" id="screen"></div>
</div>

<script>
'use strict';
/* ============================== 저장 ============================== */
const SKEY='sinip_v1';
function loadSave(){
  const d={runs:0,endings:[],nbEndings:[],stories:[]};
  try{ return Object.assign(d,JSON.parse(localStorage.getItem(SKEY))||{}); }catch(e){ return d; }
}
function saveSave(s){ try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} }
let SAVE=loadSave();

/* ============================== 상수 ============================== */
const TYPES={
  glass:{name:'유리멘탈형', desc:'신호는 노골적이지만, 늦게 보면 이미 늦었다. 병원 얘기가 나왔다면 특히.'},
  ambition:{name:'야망형', desc:'관계가 틀어진 뒤의 친근함은 호감이 아니라 수집이다. 당신의 말은 기록되고 있었다.'},
  validation:{name:'인정욕구형', desc:'리액션이 연료다. "헉 대박이에요"가 "네."가 되는 순간을 놓치면 안 됐다.'},
  balance:{name:'워라밸형', desc:'평소 모습이 이미 퇴사 직전 같아서 가장 읽기 어렵다. 유일한 확실한 신호: 안 오던 회식에 나온다.'}
};
const TYPE_ORDER=['glass','ambition','validation','balance'];
const NAMES=['한결','유하','도윤','세린','준오','다온','시안','로운'];
const MOODS={
 warm:{name:'화목',intro:'첫 출근 날, 누군가 당신 자리에 웰컴 쿠키를 놓고 갔다.\n이 사무실은 서로의 생일을 알고, 점심은 대체로 다 같이 먹는다.\n따뜻한 곳이다. 가끔, 따뜻함도 업무라는 것만 빼면.'},
 normal:{name:'평범',intro:'공기가 무난하다. 인사를 하면 인사가 돌아오고, 그 이상은 없다.\n좋게 말하면 안정적이고, 정확히 말해도 안정적이다.'},
 cold:{name:'냉랭',intro:'첫 출근 날, 아무도 고개를 들지 않았다.\n키보드 소리, 에어컨 소리. 이 사무실의 공용어는 침묵이다.\n신입이 스며들기엔, 물이 좀 차다.'},
 weird:{name:'이상함',intro:'뭐라 설명하기 어렵다.\n과장은 화분에게 말을 걸고, 김 주임은 매일 4시 17분에 사라졌다가 돌아온다.\n부장의 서랍에서는 가끔 오르골 소리가 난다. 아무도 언급하지 않는다.\n…여기서 신입을 키워야 한다.'}
};
const WEIRD_NOISE=[
 '{N}이(가) 김 주임의 4시 17분 실종에 대해 더는 묻지 않게 되었다. 적응인지 포기인지.',
 '화분이 하나 늘었다. 과장은 만족스러워 보였다. 화분도 그런 것 같았다.',
 '오르골 소리가 두 번 났다. 평소보다 한 번 많다. 의미가 있는지는 알 수 없다.',
 '{N}의 책상에 누가 귤을 하나 놓고 갔다. 이 사무실의 귤은 추적이 불가능하다.'
];
const SURNAMES=['김','이','박','정','최','한'];

const ENDINGS={
  ace:{t:'에이스의 탄생',stamp:'수습\n통과'},
  farewell:{t:'좋은 이별',stamp:'원만\n퇴사'},
  quiet:{t:'조용한 생존',stamp:'재직\n중'},
  ghost:{t:'잠수 퇴사',stamp:'무단\n결근'},
  burnout:{t:'번아웃 퇴사',stamp:'병가\n처리'},
  explode:{t:'폭발 퇴사',stamp:'당일\n퇴사'},
  shadow:{t:'당신의 그림자',stamp:'세습\n완료'},
  coup:{t:'하극상',stamp:'인사\n발령'}
};
const END_TEXT={
  ace:'수습 평가: 통과.\n부장이 말했다. "어~ 이번 신입 괜찮네? 요즘 애들 같지 않아."\n당신이 12주를 갈아 넣었다는 사실은 평가서 어디에도 적히지 않았다.\n그래도 — 그가 웃으면서 출근한다. 그거면 됐다고, 당신은 생각하기로 한다.',
  farewell:'그가 사직서를 냈다. 더 좋은 곳이었다.\n마지막 날, 짐을 다 싼 그가 말했다. "선배 덕분에 버텼어요. 진짜로요."\n당신은 오늘도 남아 있다. 잘 키워서 좋은 곳으로 보내는 것도 성공이라면,\n당신은 방금 성공했다. 사무실에서 그렇게 부르는 사람이 없을 뿐이다.',
  quiet:'그는 남았다.\n6시 1분에 사라지고, 리액션은 "네."로 통일됐고, 회식에선 고기만 굽는다.\n회사는 이 상태를 "안정화"라고 부른다.\n수습 평가: 통과. 영혼란은 공란이었다.',
  ghost:'월요일 아침, 그의 자리가 비어 있었다.\n사원증만 책상 위에 반듯하게 놓여 있었다. 각도가 완벽했다.\n전화는 꺼져 있었고, 부장이 물었다. "자네가 뭐 잘못한 거 아니야?"\n당신은 지난 12주를 처음부터 되감아 보기 시작했다.',
  burnout:'그는 성실했다. 마지막 날까지 성실했다.\n쓰러진 다음에야 다들 말했다. "걔가? 멀쩡해 보였는데."\n진단서의 병명은 당신도 아는 이름이었다.\n언젠가 당신 것이 될 뻔했던 이름.',
  explode:'금요일 오후 4시, 그가 일어섰다.\n그가 한 말은 여기 옮길 수 없지만, 사무실 전체가 들었다.\n부장의 얼굴이 실시간으로 상하는 것을 당신은 보았다.\n솔직히 조금 통쾌했다는 사실은, 무덤까지 가져가기로 한다.',
  shadow:'그는 살아남았다. 아주 잘.\n어제, 새로 온 인턴에게 그가 말하는 것을 들었다.\n"그건 원래 그런 거야. 토 달지 말고 일단 해."\n당신의 억양이었다. 쉼표 위치까지 같았다.\n당신은 그를 키웠다. 정확히 당신만큼.',
  coup:'수습 종료 조직개편 공지가 떴다.\n그의 이름 옆 직급이 당신 위 칸에 있었다. 부장 직속.\n그는 복도에서 당신에게 정중하게 목례했다.\n당신은 훌륭한 사수였다.\n당신을 밟고 올라가는 법까지 가르쳤으니까.',
  coup_dirt:'그는 퇴사했다. 아주 깔끔하게, 규정대로.\n그리고 다음 주, 당신은 감사실의 호출을 받았다.\n테이블 위에 놓인 문건에는 당신의 말들이 날짜별로 정리되어 있었다.\n\n그는 좋은 후배였다.\n당신이 한 모든 말을 기억할 만큼.'
};

/* ============================== 이벤트 데이터 ==============================
   fx: w실무 m멘탈 b소속감 o번아웃 t신뢰 r평판 q퇴사게이지 / h:독한 선택 / quote:'full'|'half'
   tm: 타입별 추가 보정(합산) / rx: 반응 / rxT: 타입별 반응 덮어쓰기
*/
const EVENTS=[
{id:'e1',w:[1,1],txt:'첫 출근. 신입 {N}이(가) 문 앞에서 90도로 인사했다. 부장이 눈짓한다. 소개를 시키라는 뜻이다.',
 ch:[
  {l:'팀 전체 앞에서 자기소개를 시킨다',fx:{b:3},tm:{glass:{m:-6},validation:{m:5,b:4},balance:{m:-2}},
   rx:'"안녕하십니까! 열심히 하겠습니다!" 목소리가 사무실 천장에 부딪혀 돌아왔다.',
   rxT:{glass:'"아, 안녕하세요… 저는…" 준비한 멘트가 있었던 것 같은데, 3초 만에 증발한 듯했다.',validation:'준비해 온 멘트가 있었다. 심지어 삼행시였다. 부장이 웃었다. 그의 눈이 반짝였다.'}},
  {l:'옆에 서서 같이 소개해준다',fx:{t:5,b:3},rx:'"잘 부탁드립니다." 당신 반 발짝 뒤에서, 그가 안전하게 착지했다.'},
  {l:'"소개는 무슨. 자리부터 안내한다"',fx:{},tm:{balance:{m:4,t:3},validation:{b:-5},glass:{m:2,b:-3}},
   rx:'그는 조용히 자리에 앉았다. 모니터 각도를 세 번 조절했다.',
   rxT:{validation:'그는 조용히 앉았다. 어딘가, 준비해 온 무언가를 도로 삼키는 표정이었다.'}}
 ]},
{id:'e2',w:[1,2],txt:'첫 업무를 정할 시간이다. 부장은 "알아서 시키라"고 했다. 그 말의 무게를 당신은 안다.',
 ch:[
  {l:'비품 정리와 문서 스캔부터',fx:{w:1,o:-2},tm:{validation:{b:-5,m:-3},ambition:{t:-4}},
   rx:'그는 성실하게 스캔했다. 스캐너 소리가 오후 내내 규칙적으로 들렸다.',
   rxT:{ambition:'"…이런 것도 다 배움이겠죠?" 웃고 있는데, 질문이 아니었다.'}},
  {l:'작은 실전 업무를 바로 준다',fx:{w:6,o:4},tm:{glass:{m:-5},ambition:{w:3,t:4,m:3}},
   rx:'그는 모니터에 바짝 붙었다. 검색창에 회사 용어를 하나씩 쳐보고 있었다.',
   rxT:{glass:'"네! 해보겠습니다!" 대답과 달리 마우스 커서가 10분째 같은 자리를 맴돌았다.',ambition:'"오, 실전이네요." 그의 타자 속도가 올라갔다. 눈에 불이 켜졌다.'}},
  {l:'내 업무 어시스트를 시키며 옆에서 가르친다',fx:{w:4,t:4},rx:'"아하, 이게 이렇게 연결되는 거군요." 그의 노트에 화살표가 늘어났다.'}
 ]},
{id:'e3',w:[2,4],bossPeek:true,txt:'{N}의 첫 보고서가 도착했다.\n엉망이다. 폰트가 세 종류고, 결론이 서론에 있고, 서론이 없다.',
 ch:[
  {l:'말없이 직접 고쳐서 올린다',fx:{w:1,m:2,t:2},rx:'그는 최종본을 보고 말했다. "와, 제가 쓴 거랑 완전 다르네요." 그러게 말이다.'},
  {l:'빨간펜으로 조목조목 피드백한다',fx:{w:8,m:-6},tm:{glass:{m:-7},validation:{m:-4,t:-2},ambition:{m:6,w:3,t:3}},
   rx:'"네… 네… 아 그렇네요…" 받아 적는 손이 점점 빨라졌다.',
   rxT:{glass:'"네……." 대답 사이의 간격이 점점 길어졌다. 빨간 줄을 볼 때마다 눈꺼풀이 미세하게 떨렸다.',ambition:'"이 부분은 왜 이렇게 고치는 게 나은가요?" 질문이 역으로 날아왔다. 좋은 질문이었다.'}},
  {l:'"일단 이대로 올려보자" — 부딪혀 봐야 안다',fx:{m:-8,b:-6,r:-6,q:8},tm:{ambition:{w:6,m:4}},
   rx:'부장실에서 그의 뒤통수가 15분간 보였다. 돌아온 그는 말이 없었다.',
   rxT:{ambition:'부장실에서 깨지고 돌아온 그는, 자리에 앉자마자 보고서 양식을 처음부터 다시 뜯어보기 시작했다. 오기가 생긴 얼굴이었다.'}}
 ]},
{id:'e4',w:[2,5],txt:'탕비실. 둘뿐이다. {N}이(가) 종이컵을 만지작거리다 조심스럽게 묻는다.\n"저… 과장님은 원래 좀… 그러세요?"',
 ch:[
  {l:'과장님 커버하기 — "그분 나름의 이유가 있어"',fx:{r:3,t:-2},tm:{glass:{m:-5},validation:{t:-3}},
   rx:'"아… 네. 그렇군요." 그는 종이컵을 두 손으로 감싸 쥐었다. 대화가 거기서 얼어붙었다.',
   rxT:{glass:'"네… 제가 이상하게 느낀 거겠죠." 그는 웃었는데, 사과 같은 웃음이었다.'}},
  {l:'적당히 넘기기 — "하하, 밥이나 먹으러 가자"',fx:{},tm:{validation:{t:-4}},
   rx:'그는 따라 웃었다. 질문은 종이컵과 함께 쓰레기통에 들어갔다.'},
  {l:'"…솔직히 좀 그렇긴 하지"',fx:{t:5},quote:'half',qtxt:'"솔직히 (과장님) 좀 그렇긴 하지"',
   tm:{validation:{t:2,m:2}},
   rx:'"그렇죠?!" 그의 목소리가 반 옥타브 올라갔다가, 스스로 놀라 내려갔다.'},
  {l:'안 좋은 점을 말한다 — "말도 마라, 작년에는…"',fx:{t:10,m:4,r:-3},quote:'full',qtxt:'과장의 작년 사건 일체 + 인물평 (상세)',
   tm:{glass:{m:4},validation:{m:3}},
   rx:'그는 눈을 반짝이며 들었다. 탕비실에서 나올 때, 둘 사이에 뭔가 공범 같은 게 생겨 있었다.'}
 ]},
{id:'e5',w:[1,3],txt:'점심시간이 다가온다. 신입의 점심을 어떻게 할지, 은근히 다들 당신만 본다.',
 ch:[
  {l:'매일 데리고 다닌다',fx:{t:4,o:2},tm:{balance:{m:-5,t:-2},glass:{m:4}},
   rx:'그는 매일 당신 옆자리에 앉았다. 메뉴는 늘 "저도 같은 걸로요"였다.',
   rxT:{balance:'3일째부터 그의 "아, 네 좋아요"에서 미세한 피로가 감지됐다. 아닐 수도 있다.'}},
  {l:'알아서 먹게 둔다',fx:{},tm:{balance:{m:5,t:3},glass:{b:-5,m:-3},validation:{b:-3}},
   rx:'그는 12시 정각에 조용히 사라졌다가 12시 58분에 돌아왔다.',
   rxT:{glass:'그는 편의점 봉투를 들고 비상계단 쪽으로 갔다. 삼각김밥이 두 개였다. 둘 다 그의 것이었다.'}},
  {l:'팀 로테이션 점심을 만든다',fx:{b:5,t:2},rx:'"오늘은 박 대리님이랑 먹었어요. 대리님 완전 웃기시더라고요." 팀에 스며드는 소리가 들렸다.'}
 ]},
{id:'e6',w:[3,6],txt:'사고다. {N}이(가) 거래처 전체회신 메일에 내부용 코멘트를 그대로 실어 보냈다.\n"이건 걔네가 급한 거니까 늦게 줘도 됨 ㅎ" — 발신 완료. 수신인 34명.',
 ch:[
  {l:'"내 검토 실수다" — 내가 방패가 된다',fx:{t:10,m:6,r:-4},
   rx:'사과 메일에 당신 이름이 올라갔다. 그는 당신 등 뒤에서 그 메일을 세 번 읽었다.\n"선배…" 뒷말은 없었지만, 있었다.'},
  {l:'직접 사과 전화를 돌리게 한다',fx:{w:6,m:-8},tm:{glass:{m:-8,q:6},ambition:{w:3,m:4}},
   rx:'그는 34명에게 전화했다. 끝났을 때 그의 이마가 번들거렸다. 하지만 다시는 전체회신을 실수하지 않을 것이다.',
   rxT:{glass:'수화기를 내려놓는 그의 손이 떨렸다. 마지막 통화가 끝나고, 그는 화장실에 15분간 다녀왔다.'}},
  {l:'모른 척한다 — 부장이 알아서 발견하겠지',fx:{m:-10,t:-10,r:-8,q:10},h:true,
   rx:'이틀 뒤 부장이 발견했다. 그는 혼자 서서 깨졌다.\n돌아오는 길에 그와 눈이 마주쳤다. 그가 먼저 피했다.'}
 ]},
{id:'e7',w:[4,8],txt:'프로젝트 막바지. 팀 전체가 야근 모드다.\n신입을 어떻게 할지, 부장은 "네가 알아서"라고 했다. 또.',
 ch:[
  {l:'신입도 당연히 남긴다',fx:{w:5,o:12},h:true,tm:{balance:{q:10,m:-8,t:-6},ambition:{w:4,o:-3},glass:{m:-5}},
   rx:'그는 남았다. 밤 10시, 그의 모니터에는 아직 창이 열두 개 떠 있었다.',
   rxT:{balance:'"…네. 남을게요." 대답까지 걸린 1.5초 동안, 그의 안에서 뭔가가 결재되는 소리가 들린 것 같았다.',ambition:'그는 오히려 살아났다. "이거 끝나면 저도 이 프로젝트 했다고 말할 수 있는 거죠?"'}},
  {l:'신입은 정시에 보낸다 — "네 몫은 내가 본다"',fx:{o:-4,t:4},tm:{ambition:{t:-5,w:-2},balance:{t:8,m:6}},
   rx:'그는 두 번 "정말 괜찮을까요?" 하고는 갔다. 세 번은 아니었다.',
   rxT:{ambition:'"…저만 빠지는 건가요?" 배려가 배제로 번역되는 순간을 당신은 실시간으로 목격했다.',balance:'"감사합니다!" 그의 퇴근 발걸음에는 리듬이 있었다. 다음 날 그는 당신 책상에 비타민 음료를 놓고 갔다.'}},
  {l:'같이 남되, 저녁은 내가 산다',fx:{w:4,o:6,t:6,b:4},
   rx:'"여기 국밥이 맛있네요." 밤 9시의 국밥은 이상하게 맛있다. 그것이 회사의 오래된 함정이다.'}
 ]},
{id:'e8',w:[5,9],bossPeek:true,txt:'{N}이(가) 낸 아이디어가 물건이다. 부장이 물었다. "이거 누가 한 거야?"\n0.5초. 당신에게 주어진 시간이다.',
 ch:[
  {l:'"신입이 했습니다" — 이름을 온전히 준다',fx:{t:12,b:6,r:3},tm:{validation:{m:10,b:5},ambition:{t:4}},
   rx:'부장이 그를 봤다. "오~ 물건이네?" 그의 귀가 빨개졌다.',
   rxT:{validation:'그날 그는 화장실 거울 앞에서 표정 관리를 연습했다. 실패했다. 온 사무실이 그의 기분을 알았다.'}},
  {l:'"같이 했습니다"',fx:{t:4,w:2},rx:'"같이"의 지분율에 대해 그가 어떻게 생각하는지는 알 수 없었다. 그는 "감사합니다"라고 했다.'},
  {l:'"제가 정리한 겁니다" — 원석은 가공한 사람 것이다',fx:{t:-15,r:-8},h:true,steal:true,
   tm:{validation:{m:-12,q:12},ambition:{t:-5}},
   rx:'그는 아무 말도 하지 않았다. 그게 제일 크게 들렸다.',
   rxT:{ambition:'그는 고개를 끄덕였다. 천천히, 두 번. 무언가를 저장하는 사람의 끄덕임이었다.'}}
 ]},
{id:'e9',w:[5,9],bossPeek:true,txt:'전체 회의 중, {N}이(가) 숫자를 잘못 읽었다. 작지 않은 실수다.\n부장의 눈썹이 올라간다. 지금 정정해야 한다.',
 ch:[
  {l:'그 자리에서 바로 지적하고 정정한다',fx:{w:4,m:-10,t:-8},h:true,tm:{glass:{m:-6,q:8},ambition:{m:6,w:2}},
   rx:'"죄송합니다. 제가 잘못 봤습니다." 그의 목소리가 회의실 에어컨 소리에 반쯤 묻혔다.',
   rxT:{glass:'그는 남은 회의 40분 동안 한 번도 고개를 들지 않았다. 노트에는 같은 숫자가 반복해서 적혀 있었다.'}},
  {l:'"제가 준 자료가 헷갈리게 되어 있었네요" — 우회 정정',fx:{w:6,t:5},
   rx:'회의 후 그가 따라와 말했다. "아까… 감사했습니다. 그리고 죄송합니다." 순서가 맞는 사과였다.'},
  {l:'아무 말 안 한다 — 회의는 흘러간다',fx:{w:-4,r:-4},
   rx:'잘못된 숫자는 회의록에 박제됐다. 다음 주에 누군가 그걸 인용할 것이다. 그때는 더 비쌀 것이다.'}
 ]},
{id:'e10',w:[6,8],txt:'옆 팀 신입이 퇴사했다는 소식이 단톡에 떴다. 입사 5개월 차였다.\n{N}이(가) 그 메시지를 오래 보고 있는 것 같다. 화면이 안 넘어간다.',
 ch:[
  {l:'지나가듯 묻는다 — "요즘 어때, 할 만해?"',fx:{t:6},tm:{glass:{m:6},balance:{m:-2}},
   rx:'"아, 네. 할 만해요." 0.8초의 지연이 있었다. 그래도 물어봐 준 것을 그는 기억할 것이다.'},
  {l:'못 본 척한다',fx:{q:3},rx:'그는 화면을 껐다. 사무실은 평소와 같은 소리로 돌아갔다. 평소와 같다는 게 어떤 뜻이든.'},
  {l:'"요즘 애들은 진짜 빨리 그만둬" 농담을 던진다',fx:{t:-8,m:-6,b:-6,q:8},h:true,
   rx:'"하하… 그러게요." 그가 웃었다. 입만.'}
 ]},
{id:'e11',w:[4,10],txt:'요즘 {N}이(가) 부쩍 살갑다. 아침마다 커피를 사 온다. 오늘은 당신 것도 있었다.\n"선배님… 부장님은 대체 왜 그러실까요? 선배님이니까 여쭤보는 거예요."',
 ch:[
  {l:'부장님 커버하기 — "그 연차 되면 다 이유가 있어"',fx:{r:3},tm:{glass:{m:-4}},
   rx:'"그렇겠죠…?" 그는 커피를 홀짝였다. 대화는 안전하게 끝났다.'},
  {l:'적당히 넘기기 — "커피 잘 마실게"',fx:{},rx:'그는 웃으며 물러났다. 커피는 아이스 아메리카노였다. 당신 취향을 알고 있었다.'},
  {l:'"…부장님이 좀 그렇긴 하지"',fx:{t:5},quote:'half',qtxt:'"부장님이 좀 그렇긴 하지"',
   rx:'"역시 선배님도 그렇게 생각하시는구나." 그가 씩 웃었다. 어딘가에 체크 표시가 하나 늘어난 기분이 들었다면, 기분 탓일까.'},
  {l:'속 시원하게 다 말한다 — 부장의 만행 연대기',fx:{t:10,m:3,r:-3},quote:'full',qtxt:'부장 만행 연대기 (연도별, 실명, 상세)',
   rx:'그는 딱 좋은 타이밍에 고개를 끄덕이고, 딱 좋은 타이밍에 놀랐다.\n완벽한 청자였다. 완벽하다는 게 마음에 걸릴 만큼.'}
 ]},
{id:'e12',w:[7,10],bossPeek:true,txt:'{N}이(가) 개선안을 들고 왔다. 3주 치 업무 자동화. 밤에 혼자 만든 티가 난다.\n"이거… 한번 봐주실 수 있을까요?"',
 ch:[
  {l:'다듬어서 부장에게 올린다 — 신입 이름으로',fx:{w:4,t:10,r:2},tm:{validation:{m:12,b:6}},
   rx:'부장 결재가 났다. 그는 메일의 "제안자: " 뒤 자기 이름을 캡처해 뒀다. 당신은 못 본 척했다.'},
  {l:'"아직은 때가 아니야" — 서랍에 넣어두게 한다',fx:{t:-8,m:-8},tm:{validation:{q:8},balance:{m:-3}},
   rx:'"아… 네. 알겠습니다." 파일명이 "개선안_v7_최종"이었다. v7이었다.'},
  {l:'"3번 슬라이드 논리가 약해. 보완해서 다시"',fx:{w:8,m:-2,t:2},tm:{ambition:{w:3,t:4,m:4}},
   rx:'이틀 뒤 v9가 도착했다. 3번 슬라이드는 반박 불가였다.',
   rxT:{ambition:'"다시 해오겠습니다." 그는 오히려 즐거워 보였다. 지는 걸 못 견디는 부류다.'}}
 ]},
{id:'e13',w:[6,11],txt:'{N}이(가) 연차 신청서를 들고 왔다. 다음 주 금요일. 성수기다.',
 ch:[
  {l:'"어, 결재할게. 푹 쉬어"',fx:{t:6,m:4},tm:{balance:{m:8,t:6}},

let G=null;
function newRun(){
  const runs=SAVE.runs;
  const distinct=new Set(SAVE.endings).size;
  const randomMode=(distinct>=4)||(runs>=10);
  const type=randomMode? TYPE_ORDER[Math.floor(Math.random()*4)] : TYPE_ORDER[Math.min(runs,3)];
  const name=SURNAMES[Math.floor(Math.random()*SURNAMES.length)]+NAMES[Math.floor(Math.random()*NAMES.length)];
  const mr=Math.random();
  const mood=mr<0.4?'normal':mr<0.6?'warm':mr<0.8?'cold':'weird';
  G={
    type, name, mood, introShown:false, week:0, tutorial:(runs===0),
    st:{w:30, m:(type==='glass'?42:55), b:50+(mood==='warm'?8:mood==='cold'?-8:0), o:20, t:50, r:60},
    gauge:10, stageDone:0, pendingStage:0, retained:false,
    harsh:0, quotes:[], collecting:false, steal:false, usedEvents:[], ledger:[],
    askedThisWeek:false, askedDirect:false, askStreak:0,
    followup:null, plantEvent:false,
    phase:null, cur:null, curWed:null, reportLines:[], over:false
  };
}
function clampAll(){const s=G.st;for(const k of ['w','m','b','o','t','r'])s[k]=Math.max(0,Math.min(100,s[k]));G.gauge=Math.max(0,Math.min(100,G.gauge));}
function applyFx(fx){ if(!fx)return; const s=G.st;
  if(fx.w)s.w+=fx.w; if(fx.m)s.m+=fx.m; if(fx.b)s.b+=fx.b; if(fx.o)s.o+=fx.o;
  if(fx.t)s.t+=fx.t; if(fx.r)s.r+=fx.r; if(fx.q)G.gauge+=fx.q; clampAll();
}

const $=s=>document.querySelector(s);
function el(html){const d=document.createElement('div');d.innerHTML=html;return d.firstElementChild;}
function screen(html){const sc=$('#screen');sc.innerHTML=html;sc.classList.remove('fadein');void sc.offsetWidth;sc.classList.add('fadein');window.scrollTo({top:0});}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fill(t){return esc(t).replaceAll('{N}','<span class="nb">'+G.name+'</span>');}
function hud(day,cls){
  let dots='';for(let i=1;i<=12;i++)dots+='<i class="'+(i<=G.week?'on':'')+'"></i>';
  return '<div class="hud"><span class="weekstamp mono"><b>W'+String(G.week).padStart(2,'0')+'</b> / 12 · 신입 '+G.name+' · 공기 '+MOODS[G.mood].name+'</span><span class="dots">'+dots+'</span></div>'
   +'<div class="daychip '+(cls||'')+'">'+day+'</div>';
}

/* ============================== 주간 루프 ============================== */
function nextWeek(){
  G.week++;
  G.askedThisWeek=false; G.askedDirect=false;
  if(G.week>12){finalEnding();return;}
  $('#gwRight').textContent='수습 '+G.week+'주차 진행 중';
  if(G.week===1&&!G.introShown){
    G.introShown=true;
    const md=MOODS[G.mood];
    screen(hud('첫 출근')+`<div class="eyebrow">이번 사무실의 공기 — ${md.name}</div>
      <p class="evt-text">${fill(md.intro)}</p>
      <button class="btn primary" id="nx">신입을 맞이한다</button>`);
    $('#nx').onclick=weekBody;
    return;
  }
  weekBody();
}
function weekBody(){
  // 월요일 이벤트 선택
  let ev=null;
  if(G.pendingStage>0){ ev={stage:G.pendingStage}; }
  else if(G.type==='ambition'&&G.collecting&&!G.usedEvents.includes('e11')&&G.week>=4){ ev=EVENTS.find(e=>e.id==='e11'); }
  else{
    const pool=EVENTS.filter(e=>!G.usedEvents.includes(e.id)&&G.week>=e.w[0]&&G.week<=e.w[1]);
    ev=pool.length? pool[Math.floor(Math.random()*pool.length)] : null;
  }
  if(ev&&ev.stage){ showStage(ev.stage); }
  else if(ev){
    G.usedEvents.push(ev.id);
    if(ev.id==='eSNS')ev=Object.assign({},ev,{txt:snsTxt()});
    showEvent(ev);
  }
  else { showFiller(); }
}

function showEvent(ev){
  G.cur=ev; G.curIsFiller=false;
  renderMonday();
}
function askButtonHtml(){
  if(G.askedThisWeek)return '';
  return G.curIsFiller
    ?'<button class="btn askbtn" id="askBtn">🗨 …요즘 어떤지 물어본다 <span class="ask-sub">주 1회 — 조용한 주일수록 물어볼 틈이 있다</span></button>'
    :'<button class="btn askbtn" id="askBtn">🗨 …이 일에 대해 따로 물어본다 <span class="ask-sub">주 1회 — 결정하기 전에, 지금 이 상황을 어떻게 받아들이고 있는지 살핀다</span></button>';
}
function bindAsk(){ const b=$('#askBtn'); if(b&&!G.askedThisWeek)b.onclick=askMenu; }
function renderMonday(){
  const ev=G.cur;
  if(!ev.ch){
    screen(hud('월요일')+`<p class="evt-text">${fill(ev.txt)}</p>
      <button class="btn primary" id="nx">한 주를 계속한다</button>`+askButtonHtml());
    $('#nx').onclick=afterMonday; bindAsk();
    return;
  }
  let btns='';
  ev.ch.forEach((c,i)=>{btns+='<button class="btn" data-i="'+i+'"><span class="num">'+'①②③④'[i]+'</span>'+esc(c.l)+'</button>';});

        balance:'"무슨 일이 있어야만 힘든 건 아니잖아요."\n정확한 말이라서, 당신은 할 말을 잃었다.'
      };
      G.st.m+=4;G.st.t+=3;G.gauge-=4;clampAll();

    }else{

    }
  }else if(v===1){
    rx='"아, 네. 별일 아니에요."\n예의상 질문은 예의상 답변으로 정산된다. 환율은 언제나 1:1이다.';
    if(G.gauge>=45){G.st.t-=2;clampAll();
      rx='"아, 네. 별일 아니에요."\n예의상 질문은 예의상 답변으로 정산된다.\n다만 그는 알았다. 당신이 "별일 아니지?"라고 물을 때, 이미 답을 정해놓고 물었다는 걸. 그런 건 다 티가 난다.';}
  }else{

    }else if(G.gauge>=30){
      rx='"어… 잘 모르겠는데요. 크게 신경 쓰는 것 같진 않던데. 원래 좀 조용하잖아요."\n김 주임은 모니터에서 눈을 떼지 않고 대답했다. 세상에서 제일 성의 없는 진심이었다.';
    }else{

    }
    if(Math.random()<0.3){
      G.st.t-=4;clampAll();
      rx+='\n\n— 다음 날 아침, 신입의 인사가 0.5도쯤 서늘했다.\n"저에 대해… 물어보고 다니신다면서요."\n소문은 이 사무실에서 가장 빠른 통신 프로토콜이다.';

function chooseEvent(i){
  const c=G.cur.ch[i];
  G.peekedEvent=!G.cur.bossPeek;
  applyFx(c.fx);
  if(c.tm&&c.tm[G.type])applyFx(c.tm[G.type]);
  if(c.h)G.harsh++;
  if(c.steal){G.steal=true;if(G.type==='ambition'){G.st.t=Math.max(0,G.st.t-8);clampAll();}}
  if(c.quote){
    const q={week:G.week,txt:c.qtxt,full:c.quote==='full',armed:G.collecting};
    G.quotes.push(q);
  }
  if(G.cur.id==='eSurvey'&&i===0){
    const r=Math.random();
    G.followup={due:G.week+1,kind:r<0.4?'sv_none':r<0.8?'sv_leak':'sv_change'};
  }
  if(G.type==='ambition'&&G.st.t<38)G.collecting=true;
  let rx=(c.rxT&&c.rxT[G.type])||c.rx||'';
  // e13 이유 묻기: 게이지 높은 유리멘탈이면 병원 복선
  if(c.leaveAsk&&G.type==='glass'&&G.gauge>=40){
    rx='"아… 그게…" 그가 잠시 머뭇거렸다. "병원에… 좀."\n병원. 당신은 그 단어를 어디에 적어둬야 할지 몰랐다.';
  }
  showReaction(rx);
}
function showReaction(rx){G.lastRx=rx;renderReaction();}
function renderReaction(){
  const canPeek=G.cur&&G.cur.bossPeek&&!G.peekedEvent;
  screen(hud('월요일')+`<p class="evt-text">${fill(G.cur.txt)}</p>
    <div class="bubble"><div class="who">신입 ${G.name}</div>${fill(G.lastRx)}</div>
    <button class="btn primary" id="nx">한 주를 계속한다</button>`
    +(canPeek?'<button class="btn askbtn" id="peekBtn">👀 부장님 눈치를 살핀다</button>':''));
  $('#nx').onclick=afterMonday;
  const pb=$('#peekBtn'); if(pb)pb.onclick=bossPeekAct;
}
function bossPeekAct(){

  else{const pool=BOSS_PEEK.concat(SIG_BOSS);t=pool[Math.floor(Math.random()*pool.length)];}
  G.ledger.push({week:G.week,t,real});
  screen(hud('월요일')+`<div class="bubble"><div class="who">부장</div>${fill(t)}</div>

function showFiller(){

  G.curIsFiller=true;
  renderMonday();
}
function afterMonday(){
  // 예약된 후속 이벤트 (익명 설문 등)
  if(G.followup&&G.week>=G.followup.due){
    const fu=SURVEY_FU[G.followup.kind]; G.followup=null;
    applyFx(fu.fx);

      <button class="btn primary" id="nx">금요일로</button>`);

    if(wd.yt&&G.mood==='weird'&&Math.random()<0.3)wd={txt:wd.rareTxt,choice:wd.rareChoice};
    G.curWed=wd;
    let inner=`<p class="evt-text">${fill(wd.txt)}</p>`;
    if(wd.choice){
      let btns='';wd.choice.forEach((c,i)=>{btns+='<button class="btn" data-i="'+i+'"><span class="num">'+'①②③④'[i]+'</span>'+esc(c.l)+'</button>';});
      screen(hud('수요일')+inner+btns);
      document.querySelectorAll('.btn[data-i]').forEach(b=>b.onclick=()=>{
        let c=wd.choice[+b.dataset.i];
        if(c.raid)c=Math.random()<0.5?RAID_WIN:RAID_LOSE;
        applyFx(c.fx);
        if(c.tm&&c.tm[G.type])applyFx(c.tm[G.type]);
        if(c.h)G.harsh++;

        screen(hud('수요일')+inner+`<div class="bubble"><div class="who">${c.who||'신입 '+G.name}</div>${fill(wrx)}</div>

      });
      return;
    }

    screen(hud('수요일')+inner+`<button class="btn primary" id="nx">금요일로</button>`);

}

/* ---------- 금요일 관찰 일지 ---------- */
function pickStateLine(){
  const s=G.st;
  if(s.o>=65)return {t:pick(OBS.burnoutHigh),real:true};
  if(s.m<=42)return {t:pick(OBS.mentalLow),real:true};
  if(s.b<=40)return {t:pick(OBS.belongLow),real:true};
  if(s.m>=64)return {t:pick(OBS.mentalHigh),real:true};
  if(s.b>=62)return {t:pick(OBS.belongHigh),real:true};
  if(s.w>=62)return {t:OBS.workHigh[0],real:true};
  if(s.w<=34)return {t:OBS.workLow[0],real:true};
  return null;
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function friday(){
  const lines=[];
  const st=pickStateLine(); if(st)lines.push({t:st.t,hint:true});
  lines.push({t:pick(OBS.noise),hint:false});
  if(G.mood==='weird'&&Math.random()<0.5)lines.push({t:pick(WEIRD_NOISE),hint:false});
  if(G.gauge>=38&&G.stageDone===0)lines.push({t:FORESHADOW[G.type],hint:true});
  // 미세 신호 — 냉랭한 사무실은 어색함이 일상이라 노이즈가 더 잦다
  const peerBase=Math.random()<(G.mood==='cold'?0.24:0.14), peerExtra=!peerBase&&G.st.r<45&&Math.random()<0.22;
  if(peerBase||peerExtra){const t=pick(SIG_PEER);lines.push({t,sig:true});G.ledger.push({week:G.week,t,real:peerExtra});}
  const bossBase=Math.random()<0.10, bossExtra=!bossBase&&G.st.r<42&&Math.random()<0.28;
  if(bossBase||bossExtra){const t=pick(SIG_BOSS);lines.push({t,sig:true});G.ledger.push({week:G.week,t,real:bossExtra});}
  shuffle(lines);
  let lis='';
  for(const L of lines){
    const cls=(G.tutorial&&L.hint)?' class="hinted"':'';
    lis+='<li'+cls+'>'+fill(L.t)+'</li>';
  }
  screen(hud('금요일 — 주간 관찰 일지','fri')+`
    <div class="report"><h3>이번 주, 당신이 본 것들</h3><ul>${lis}</ul></div>
    ${G.tutorial?'<div class="tutor-note">📎 첫 회차 한정 — 노란 줄은 의미 있는 관찰입니다. 다음 회차부터는 스스로 가려내야 합니다. 나머지는… 아무 의미 없을 수도 있습니다.</div>':''}
    <button class="btn primary" id="nx">주말을 보낸다</button>`);
  $('#nx').onclick=endWeek;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

/* ---------- 주 마감: 게이지/징조/즉시엔딩 ---------- */
function endWeek(){
  const s=G.st;
  let dq=0;
  if(s.m<48)dq+=(48-s.m)*0.5;
  if(s.b<48)dq+=(48-s.b)*0.35;
  if(s.o>50)dq+=(s.o-50)*0.4;
  if(s.m>60&&s.b>55)dq-=5;
  if(G.mood==='warm')dq-=2;
  if(G.mood==='cold')s.b=Math.max(0,s.b-1);
  G.askStreak=G.askedDirect?G.askStreak+1:0;
  const oDrift=1.5+(s.w>60?1.5:0)+(s.m<45?(45-s.m)*0.1:0);
  G.gauge+=dq; s.o=Math.min(100,s.o+oDrift); s.w=Math.min(100,s.w+1.5); clampAll();
  if(G.type==='ambition'&&s.t<38)G.collecting=true;
  if(s.o>=88){quitEnding('burnout');return;}
  if(G.gauge>=100){quitEnding(null);return;}
  if(G.gauge>=82&&G.stageDone<3)G.pendingStage=3;
  else if(G.gauge>=65&&G.stageDone<2)G.pendingStage=2;
  else if(G.gauge>=45&&G.stageDone<1)G.pendingStage=1;
  nextWeek();
}

/* ---------- 징조 스테이지 ---------- */
function showStage(n){
  const sd=STAGES[G.type][n-1];
  G.cur=sd; G.curStageN=n;
  let btns='';sd.ch.forEach((c,i)=>{btns+='<button class="btn" data-i="'+i+'"><span class="num">'+'①②③'[i]+'</span>'+esc(c.l)+'</button>';});
  screen(hud('월요일')+`<p class="evt-text">${fill(sd.txt)}</p>`+btns);
  document.querySelectorAll('.btn[data-i]').forEach(b=>b.onclick=()=>chooseStage(+b.dataset.i));
}
function chooseStage(i){
  const n=G.curStageN, c=G.cur.ch[i];
  G.pendingStage=0; G.stageDone=Math.max(G.stageDone,n);
  if(n<3){
    if(c.k==='correct'){G.gauge-=18;G.st.m+=8;G.st.t+=5;}
    else if(c.k==='neutral'){G.gauge-=4;}
    else{G.gauge+=12;G.harsh++;G.st.t-=5;}
    clampAll();
    showReaction(c.rx);
    return;
  }
  // 스테이지 3: 면담
  if(c.k==='retain'){
    let ok=false;
    if(G.type==='glass')ok=G.st.t>=50;
    if(G.type==='ambition')ok=G.st.r>=48;
    if(G.type==='validation')ok=G.st.t>=45;
    if(G.type==='balance')ok=G.st.o<=55;
    if(ok&&!G.retained){
      G.retained=true;G.gauge=45;G.st.m+=10;clampAll();
      showReaction('긴 대화였다. 그는 몇 번 창밖을 봤고, 마지막에 고개를 끄덕였다.\n"…조금만 더 해볼게요."\n조금만 더. 그 말의 유효기간을 당신은 안다. 그래도 오늘은 이겼다.');
      return;
    }
    quitEnding(null,'그는 끝까지 들었다. 예의 바르게. 그리고 말했다.\n"말씀은 감사한데… 이미 마음을 정했어요."\n어떤 대화는 결론이 아니라 절차다.');
    return;
  }
  if(c.k==='release'){
    if(G.st.w>=55&&G.st.t>=45){endGame('farewell');return;}
    quitEnding(null,'그는 "감사합니다"라고 말하고 회의실을 나갔다. 문이 조용히 닫혔다.');
    return;
  }
  // wrong
  G.harsh++;G.st.t-=10;clampAll();
  quitEnding(null,'그 말이 끝나기 전에, 그의 표정에서 마지막 불이 꺼지는 것을 당신은 봤다.');
}

/* ---------- 엔딩 판정 ---------- */
function ammoCount(){return G.quotes.reduce((a,q)=>a+(q.armed?(q.full?1:0.5):0),0);}
function quitEnding(force,pre){
  let key;
  if(force==='burnout')key='burnout';
  else if(G.type==='ambition'&&ammoCount()>=1.5)key='coup';
  else if(G.st.o>=70)key='burnout';
  else if(G.harsh>=4&&G.type==='validation')key='explode';
  else if(G.harsh>=5)key='explode';
  else key='ghost';
  endGame(key,pre,key==='coup');
}
function finalEnding(){
  const s=G.st;
  if(s.w>=58&&s.r<=50&&(s.t<=40||(G.steal&&s.t<=48))){endGame('coup',null,G.type==='ambition'&&ammoCount()>=1.5);return;}
  if(s.w>=65&&s.t>=60&&s.b<=40){endGame('farewell');return;}
  if(G.harsh>=5&&s.w>=55){endGame('shadow');return;}
  if(s.w>=58&&s.m>=55&&s.b>=55){endGame('ace');return;}
  endGame('quiet');
}

function endGame(key,pre,dirt){
  G.over=true;
  SAVE.runs++;
  if(!SAVE.endings.includes(key))SAVE.endings.push(key);
  saveSave(SAVE);
  $('#gwRight').textContent='수습 평가 보고서';
  const e=ENDINGS[key];
  const body=(pre?pre+'\n\n':'')+(dirt?END_TEXT.coup_dirt:END_TEXT[key]);
  // 회고: 신호 정산
  let verdicts='';
  const led=G.ledger.slice(-4);
  if(led.length){
    for(const L of led){
      verdicts+=`<div class="verdict"><div class="vq">${G.week>12?'':''}${L.week}주차 — “${esc(L.t)}”</div>
      <div class="vt ${L.real?'real':'noise'}">${L.real?'그건 진짜였다.':'아무 의미 없었다.'}</div></div>`;
    }
  }else{
    verdicts='<p class="subtle">이번 판에는 미세 신호가 기록되지 않았다. 조용한 회사였다. 그게 더 무섭지만.</p>';
  }
  // 수집된 발언
  let quoteBlock='';
  const armed=G.quotes.filter(q=>q.armed);
  if(G.type==='ambition'&&armed.length){
    let qs='';armed.forEach(q=>{qs+=`<div class="q">· ${q.week}주차 — ${esc(q.txt)}</div>`;});
    quoteBlock=`<div class="quotelist"><b>📁 수집된 발언 ${armed.length}건</b>${qs}
      <div class="subtle" style="margin-top:6px">수집 개시 시점: 신뢰가 무너진 직후. 그때부터 그는 살가워졌다.</div></div>`;
  }else if(G.type==='ambition'&&G.quotes.length){
    quoteBlock=`<p class="subtle">당신이 흘린 말 ${G.quotes.length}건 — 다행히 관계가 틀어지기 전의 것이었다. 좋았던 시절의 뒷담은 그냥 추억이다.</p>`;
  }
  // 평판 감사 보고서 — 진짜 사유(있으면) + 어이없는 사유 랜덤
  const repReasons=[];
  if(G.steal)repReasons.push('그 아이디어의 이름이 바뀐 건 — 다들 알고 있었다. 모르는 척했을 뿐이다.');
  if(G.quotes.length&&G.st.r<60)repReasons.push('당신의 뒷담은 세 다리를 건너 당사자에게 도착했다. 도착했을 땐 1.5배로 불어 있었다.');
  if(G.harsh>=4)repReasons.push('회의실 유리벽은 생각보다 방음이 되지 않는다.');
  const absurdPool=REP_ABSURD.slice(); shuffle(absurdPool);
  repReasons.push(...absurdPool.slice(0,G.st.r<45?2:1));
  const repFrame=G.st.r<45
    ?'평판이 어쩌다 이 지경이 됐는지, 사내 정보통이 취합해 준 경위서다. 실제 세계에선 영원히 알 수 없는 정보다.'
    :'평판은 무사한 편이었다. 그래도 이런 건들이 접수되어 있었다고 한다. 세상 일이 다 그렇다.';
  let repHtml=`<p class="subtle" style="margin:6px 0 10px">${repFrame}</p>`;
  repReasons.slice(0,3).forEach((r,i)=>{repHtml+=`<div class="verdict"><div class="vq">접수 건 #${String(i+1).padStart(2,'0')}</div><div style="margin-top:2px">${esc(r)}</div></div>`;});
  const bars=[['실무',s2('w')],['멘탈',s2('m')],['소속감',s2('b')],['번아웃',s2('o'),true],['신뢰',s2('t')],['내 평판',s2('r')]];
  function s2(k){return Math.round(G.st[k]);}
  let barHtml='';for(const[b,v,warn]of bars){barHtml+=`<div class="row"><span class="k">${b}</span><span class="bar"><i class="${warn&&v>60?'warn':''}" style="width:${v}%"></i></span><span class="mono" style="font-size:12px;width:30px;text-align:right">${v}</span></div>`;}
  screen(`
    <div class="end-sheet">
      <div class="stamp">${e.stamp.replace('\n','<br>')}</div>

      <div class="eyebrow">ENDING ${SAVE.endings.length} / 8</div>
      <h2 class="end-title">${e.t}</h2>
      <p class="end-body">${esc(body)}</p>
      <div class="retro">
        <h3>회고 — 이제야 보이는 것들</h3>
        <div class="typecard">신입 ${G.name}의 유형: <b>${TYPES[G.type].name}</b><br><span class="subtle">${TYPES[G.type].desc}</span><br><span class="subtle">사무실 공기: ${MOODS[G.mood].name}</span></div>
        ${quoteBlock}
        ${barHtml}
        <h3 style="margin-top:20px">평판 감사 보고서 — 이제야 입수된 경위</h3>
        ${repHtml}
        <h3 style="margin-top:20px">신호 정산 — 그 침묵과 “어…”의 진실</h3>
        ${verdicts}
      </div>
      ${storyBoxHtml()}
      <button class="btn primary" id="again">다음 신입을 받는다</button>
      <button class="btn ghostbtn" id="toTitle">도장판 확인</button>
    </div>`);
  bindStoryBox('mentor',key);
  $('#again').onclick=()=>{newRun();nextWeek();};
  $('#toTitle').onclick=showTitle;
}

/* ============================== 사연 접수 ============================== */
function storyBoxHtml(){
  return `<div class="storybox"><h3>📮 당신의 이야기를 접수합니다</h3>
    <p class="subtle">플레이하다 떠오른 '실제 회사에서 겪은 일'을 남겨주세요. 다음 업데이트의 이벤트가 될 수 있습니다.</p>
    <textarea id="storyText" rows="3" placeholder="예: 저희 부장님은 진짜로 화분한테…"></textarea>
    <button class="btn" id="storySaveBtn">사연 접수</button>
    <span class="subtle" id="storyDone"></span></div>`;
}
function bindStoryBox(mode,endKey){
  const b=$('#storySaveBtn'); if(!b)return;
  b.onclick=()=>{
    const ta=$('#storyText'); const v=(ta.value||'').trim();
    if(!v){$('#storyDone').textContent=' 내용이 비어 있습니다.';return;}
    SAVE.stories.push({mode,ending:endKey,text:v.slice(0,2000),ts:new Date().toISOString().slice(0,10)});
    saveSave(SAVE);
    ta.value='';
    $('#storyDone').textContent=' 접수 완료. 소중한 제보는 게임이 됩니다.';
  };
}

let NB=null;
function nbNewRun(){
  const keys=Object.keys(SASU_TYPES);
  NB={sasu:keys[Math.floor(Math.random()*keys.length)],week:0,
      m:55,g:30,r:55,o:15,job:false,used:[]};
}
function nbClamp(){NB.m=Math.max(0,Math.min(100,NB.m));NB.g=Math.max(0,Math.min(100,NB.g));NB.r=Math.max(0,Math.min(100,NB.r));NB.o=Math.max(0,Math.min(100,NB.o));}
function nbApply(fx){if(!fx)return;if(fx.m)NB.m+=fx.m;if(fx.g)NB.g+=fx.g;if(fx.r)NB.r+=fx.r;if(fx.o)NB.o+=fx.o;nbClamp();}
function nbHud(day){
  let dots='';for(let i=1;i<=12;i++)dots+='<i class="'+(i<=NB.week?'on':'')+'"></i>';
  const warn=NB.m<40;
  return `<div class="hud"><span class="weekstamp mono"><b>W${String(NB.week).padStart(2,'0')}</b> / 12 · 신입(나) · 사수 관찰 중</span><span class="dots">${dots}</span></div>
  <div class="nbstat"><span>내 멘탈</span><span class="bar"><i class="${warn?'warn':''}" style="width:${Math.round(NB.m)}%"></i></span><span class="mono">${Math.round(NB.m)}</span><span class="subtle">— 내 속은 나만 안다. 문제는 남의 속이다.</span></div>
  <div class="daychip">${day}</div>`;
}
function nbWeek(){
  NB.week++;
  if(NB.week>12){nbFinal();return;}
  $('#gwRight').textContent='신입 모드 β — '+NB.week+'주차';
  const pool=NB_EVENTS.filter(e=>!NB.used.includes(e.id)&&NB.week>=e.w[0]&&NB.week<=e.w[1]);
  const ev=pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
  if(ev)NB.used.push(ev.id);
  NB.cur=ev;
  nbRenderCur();
}
function nbRenderCur(){
  if(!NB.cur){
    screen(nbHud('월요일')+`<p class="evt-text">아무 일 없는 한 주. 회사에서 이것은 기적에 해당한다.\n당신은 기적을 조용히 소비했다.</p>
      <button class="btn primary" id="nx">다음 주로</button>`+nbQuitBtn());
    $('#nx').onclick=nbMidweek; nbBindQuit();
    return;
  }
  const ev=NB.cur;
  let btns='';ev.ch.forEach((c,i)=>{btns+='<button class="btn" data-i="'+i+'"><span class="num">'+'①②③④'[i]+'</span>'+esc(c.l)+'</button>';});
  const tag=ev.story?'<span class="storytag">📮 실화 제보 이벤트</span>':'';
  screen(nbHud('월요일')+tag+`<p class="evt-text">${esc(ev.txt)}</p>`+btns+nbQuitBtn());
  document.querySelectorAll('.btn[data-i]').forEach(b=>b.onclick=()=>nbChoose(+b.dataset.i));
  nbBindQuit();
}
function nbQuitBtn(){return '<button class="btn askbtn" id="quitBtn">🚪 …사직서를 낸다</button>';}
function nbBindQuit(){
  const q=$('#quitBtn'); if(!q)return;
  q.onclick=()=>{
    screen(nbHud('월요일')+`<p class="evt-text">사직서 양식이 열려 있다.\n"일신상의 사유"라는 다섯 글자가 모든 것을 덮어줄 것이다.\n정말 내는가?</p>
      <button class="btn" data-i="0"><span class="num">①</span>낸다. 오늘이 그날이다</button>
      <button class="btn ghostbtn" id="backBtn">…접는다. 아직은 아니다</button>`);
    document.querySelectorAll('.btn[data-i]').forEach(b=>b.onclick=()=>nbEnd('nbEscape'));
    $('#backBtn').onclick=nbRenderCur;
  };
}
function nbChoose(i){
  const c=NB.cur.ch[i];
  nbApply(c.fx);
  if(c.tm&&c.tm[NB.sasu])nbApply(c.tm[NB.sasu]);
  if(c.job)NB.job=true;
  let rx=(c.rxT&&c.rxT[NB.sasu])||c.rx, who=c.who||'사수';
  if(c.post){
    const r=Math.random();
    if(r<0.4)rx='등록 완료. 아침에 보니 조회수 2.\n세상은 바쁘다. 그래도 쓰고 나니 조금 후련했다.';
    else if(r<0.7){nbApply({m:8});rx='댓글 32개. "버티지 마세요"가 추천 47.\n이상하게, 모르는 사람들의 말이 제일 따뜻했다.';}
    else{nbApply({r:-8,m:-3});rx='다음 날, 사수가 지나가듯 말했다. "요즘… 힘든가 봐?"\n심장이 발밑까지 내려갔다 돌아왔다. 익명의 수명은 하루였다.';}
  }
  if(c.stealth){
    if(Math.random()<0.5)rx='아무도 몰랐다. 완전 범죄.\n다만 당신은 그날부터 모든 숫자를 두 번 본다. 이것을 성장이라고 부르기로 했다.';
    else{nbApply({r:-8,m:-6});rx='"이거 왜 수치가 달라졌지?"\n들켰다. 고친 것보다 말하지 않은 것이 문제가 됐다. 그것이 회사의 문법이었다.';}
  }
  screen(nbHud('월요일')+`<p class="evt-text">${esc(NB.cur.txt)}</p>
    <div class="bubble"><div class="who">${who}</div>${esc(rx)}</div>
    <button class="btn primary" id="nx">한 주를 버틴다</button>`);
  $('#nx').onclick=nbMidweek;
}
function nbMidweek(){
  if(Math.random()<0.4){
    const w=pick(NB_WED);
    nbApply(w.fx);
    screen(nbHud('수요일')+`<p class="evt-text">${esc(w.txt)}</p>
      <button class="btn primary" id="nx">주말을 향해</button>`);
    $('#nx').onclick=nbSunday;
    return;
  }
  nbSunday();
}
function nbSunday(){
  let pool;
  if(NB.o>=60)pool=NB_SUN.tired;
  else if(NB.m>=60)pool=NB_SUN.good;
  else if(NB.m>=40)pool=NB_SUN.mid;
  else pool=NB_SUN.low;
  screen(nbHud('일요일 밤','fri')+`<div class="report"><h3>일요일 밤의 나</h3><p style="margin:0">${esc(pick(pool))}</p></div>
    <button class="btn primary" id="nx">월요일을 향해</button>`);
  $('#nx').onclick=nbEndWeek;
}
function nbEndWeek(){
  const drift={hands_off:1,micro:2.5,nice:0.8,perf:2}[NB.sasu];
  NB.g+=drift;
  NB.m-=2+(NB.o>50?2:0); // 버티는 것 자체의 비용
  NB.o+=2.2+(NB.m<45?2:0)+(NB.sasu==='micro'?1:0)+(NB.sasu==='perf'?0.5:0);
  nbClamp();
  if(NB.o>=85){nbEnd('nbBurnout');return;}
  if(NB.m<=5){nbEnd('nbGhost');return;}
  nbWeek();
}
function nbFinal(){
  if(NB.job&&NB.g>=50){nbEnd('nbJob');return;}
  if(NB.g>=58&&NB.m>=55){nbEnd('nbAce');return;}
  if(NB.m<40){nbEnd('nbHollow');return;}
  nbEnd('nbPass');
}
function nbEnd(key){
  if(!SAVE.nbEndings.includes(key))SAVE.nbEndings.push(key);
  saveSave(SAVE);
  $('#gwRight').textContent='신입 모드 β — 수습 결과';
  const e=NB_ENDINGS[key];
  screen(`
    <div class="end-sheet">
      <div class="stamp">${e.stamp.replace('\n','<br>')}</div>
      <div class="end-head">인사관리시스템 — 수습 결과 통지서 (본인 열람용)</div>
      <div class="eyebrow">신입 모드 β · ${SAVE.nbEndings.length} / ${Object.keys(NB_ENDINGS).length}</div>
      <h2 class="end-title">${e.t}</h2>
      <p class="end-body">${esc(NB_END_TEXT[key])}</p>
      <div class="retro">
        <h3>회고 — 그 사수는 누구였나</h3>
        <div class="typecard">당신의 사수: <b>${SASU_TYPES[NB.sasu].name}</b><br><span class="subtle">${SASU_TYPES[NB.sasu].desc}</span></div>
        <div class="row"><span class="k">성장</span><span class="bar"><i style="width:${Math.round(NB.g)}%"></i></span><span class="mono" style="font-size:12px;width:30px;text-align:right">${Math.round(NB.g)}</span></div>
        <div class="row"><span class="k">번아웃</span><span class="bar"><i class="${NB.o>60?'warn':''}" style="width:${Math.round(NB.o)}%"></i></span><span class="mono" style="font-size:12px;width:30px;text-align:right">${Math.round(NB.o)}</span></div>
        <div class="row"><span class="k">사수의 평가</span><span class="bar"><i style="width:${Math.round(NB.r)}%"></i></span><span class="mono" style="font-size:12px;width:30px;text-align:right">${Math.round(NB.r)}</span></div>
        <p class="subtle" style="margin-top:8px">사수의 평가 — 이 수치를 12주 내내 몰랐다는 것. 그것이 신입의 삶이다.</p>
      </div>
      ${storyBoxHtml()}
      <button class="btn primary" id="again">한 번 더 신입이 된다</button>
      <button class="btn ghostbtn" id="toTitle">타이틀로</button>
    </div>`);
  bindStoryBox('newbie',key);
  $('#again').onclick=()=>{nbNewRun();nbWeek();};
  $('#toTitle').onclick=showTitle;
}

showTitle();
</script>
</body>
</html>
